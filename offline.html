<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#06101d"><title>DotCanvas Offline</title><style>html,body{height:100%;margin:0;background:#06101d;color:#eef7ff;font-family:system-ui,-apple-system,sans-serif}body{display:grid;place-items:center;padding:24px;box-sizing:border-box}.card{max-width:420px;text-align:center;padding:28px;border:1px solid #1f5580;border-radius:24px;background:rgba(14,34,54,.82);box-shadow:0 30px 90px #0008}.mark{font-size:52px;color:#63d8ff}p{color:#9fb5c9;line-height:1.55}button{border:1px solid #2d8cff;background:#173c65;color:white;border-radius:14px;padding:12px 18px;font-weight:700}</style></head><body><main class="card"><div class="mark">◈</div><h1>DotCanvas is offline</h1><p>The app shell could not be loaded. Reconnect once, reopen DotCanvas, and it will cache the newest version for offline use.</p><button onclick="location.reload()">Try again</button></main></body></html>
